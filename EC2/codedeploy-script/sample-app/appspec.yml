version: 0.0
os: linux
files:
  - source: /
    destination: /var/www/sample-app
permissions:
  - object: /var/www/sample-app
    pattern: "**"
    owner: ubuntu 
    group: ubuntu 
    mode: 755
hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 300
      runas: ubuntu
  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: ubuntu
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 300
      runas: ubuntu
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 300
      runas: ubuntu